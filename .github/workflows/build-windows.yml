name: Build Windows Executable

on:
  push:
    branches: [ "main", "refactor/code-review-improvements" ]
    tags: [ "v*.*.*" ]
  workflow_dispatch: # Permite rodar manualmente na aba 'Actions'

jobs:
  build_windows_exe:
    runs-on: windows-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    - name: Install uv
      uses: astral-sh/setup-uv@v5
      with:
        version: "latest"
        enable-cache: true

    - name: Install Dependencies
      run: |
        uv sync
        uv pip install pyinstaller

    - name: Compilar (.exe) usando PyInstaller
      run: |
        uv run pyinstaller --noconfirm --onefile --windowed --name "XMLtoEXCEL" --icon "assets/ico.ico" --add-data "bin/UnRAR.exe;bin" --add-data "assets/ico.ico;assets" main.py

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: EXE-Windows
        path: dist/XMLtoEXCEL.exe
        retention-days: 14
